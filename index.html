<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronPulse Gym - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Roboto:wght@300;400;500&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #000000 0%, #0a0a1a 50%, #000510 100%);
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 80, 255, 0.15) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            animation: pulse 6s ease-in-out infinite;
        }

        .bg-animation::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 120, 255, 0.1) 0%, transparent 70%);
            bottom: -100px;
            right: -100px;
            animation: pulse 6s ease-in-out infinite reverse;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #0066ff;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100px) translateX(50px); opacity: 0; }
        }

        /* Dumbbell animation */
        .dumbbell-container {
            position: fixed;
            bottom: 30px;
            right: 40px;
            z-index: 1;
            opacity: 0.15;
            animation: dumbbellPump 2s ease-in-out infinite;
        }

        @keyframes dumbbellPump {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .dumbbell-svg {
            width: 120px;
            height: 60px;
        }

        /* Left side gym image area */
        .gym-visual {
            position: fixed;
            left: 0;
            top: 0;
            width: 45%;
            height: 100%;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .gym-visual::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, #0055ff, transparent);
            animation: lineGlow 3s ease-in-out infinite;
        }

        @keyframes lineGlow {
            0%, 100% { opacity: 0.3; box-shadow: 0 0 5px #0055ff; }
            50% { opacity: 1; box-shadow: 0 0 20px #0055ff; }
        }

        .gym-logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 64px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 1;
            text-align: center;
            animation: fadeInDown 1s ease;
        }

        .gym-logo span {
            color: #0066ff;
            text-shadow: 0 0 20px rgba(0, 102, 255, 0.8);
        }

        .gym-tagline {
            font-family: 'Rajdhani', sans-serif;
            color: #4488ff;
            font-size: 16px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 10px;
            animation: fadeInUp 1s ease 0.3s both;
        }

        .gym-stats {
            display: flex;
            gap: 40px;
            margin-top: 60px;
            animation: fadeInUp 1s ease 0.6s both;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-family: 'Rajdhani', sans-serif;
            font-size: 42px;
            font-weight: 700;
            color: #0066ff;
            display: block;
            text-shadow: 0 0 15px rgba(0, 102, 255, 0.5);
            animation: countUp 2s ease 1s both;
        }

        .stat-label {
            font-size: 11px;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Big barbell icon in background */
        .big-icon {
            margin-top: 50px;
            animation: fadeIn 1.5s ease 0.8s both;
        }

        .big-icon svg {
            width: 280px;
            height: 140px;
            opacity: 0.2;
            filter: drop-shadow(0 0 20px #0066ff);
            animation: iconGlow 3s ease-in-out infinite;
        }

        @keyframes iconGlow {
            0%, 100% { filter: drop-shadow(0 0 10px #0033cc); }
            50% { filter: drop-shadow(0 0 30px #0066ff); }
        }

        /* Login form */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 430px;
            margin-left: 45%;
            animation: slideInRight 0.8s ease;
            padding: 20px;
        }

        @keyframes slideInRight {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .login-card {
            background: rgba(5, 5, 20, 0.9);
            border: 1px solid rgba(0, 80, 255, 0.2);
            border-radius: 16px;
            padding: 45px 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 60px rgba(0, 60, 255, 0.15), inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        .login-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 6px;
        }

        .login-subtitle {
            color: #556;
            font-size: 13px;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-label {
            display: block;
            color: #4488ff;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 80, 255, 0.25);
            border-radius: 8px;
            padding: 14px 18px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            font-family: 'Roboto', sans-serif;
        }

        .form-input::placeholder {
            color: #334;
        }

        .form-input:focus {
            border-color: #0066ff;
            background: rgba(0, 80, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 102, 255, 0.15);
        }

        .input-icon {
            position: absolute;
            right: 15px;
            top: 38px;
            color: #334;
            transition: color 0.3s;
        }

        .form-input:focus + .input-icon {
            color: #0066ff;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #667;
            font-size: 13px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #0066ff;
            cursor: pointer;
        }

        .forgot-link {
            color: #4488ff;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: #66aaff;
            text-shadow: 0 0 10px rgba(68, 136, 255, 0.5);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #0044cc, #0066ff);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #0055ee, #0077ff);
            box-shadow: 0 0 30px rgba(0, 102, 255, 0.5);
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(0, 80, 255, 0.15);
        }

        .divider-text {
            color: #445;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .social-btns {
            display: flex;
            gap: 12px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0, 80, 255, 0.2);
            border-radius: 8px;
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Roboto', sans-serif;
        }

        .social-btn:hover {
            border-color: #0066ff;
            color: #fff;
            background: rgba(0, 80, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 102, 255, 0.15);
        }

        .register-link {
            text-align: center;
            margin-top: 25px;
            color: #556;
            font-size: 13px;
        }

        .register-link a {
            color: #0077ff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .register-link a:hover {
            color: #4499ff;
            text-shadow: 0 0 10px rgba(0, 119, 255, 0.5);
        }

        /* Animations */
        @keyframes fadeInDown {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Progress bar animation */
        .power-bar {
            width: 100%;
            height: 2px;
            background: rgba(0, 80, 255, 0.1);
            border-radius: 2px;
            margin-bottom: 35px;
            overflow: hidden;
        }

        .power-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #0033cc, #0088ff);
            border-radius: 2px;
            animation: powerFill 2s ease-in-out infinite;
        }

        @keyframes powerFill {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .gym-visual { display: none; }
            .login-container {
                margin-left: 0;
                max-width: 430px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="bg-animation"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Left gym visual -->
    <div class="gym-visual">
        <div class="gym-logo">IRON<br><span>PULSE</span></div>
        <div class="gym-tagline">Forge Your Legacy</div>

        <div class="gym-stats">
            <div class="stat-item">
                <span class="stat-number">500+</span>
                <span class="stat-label">Members</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">24/7</span>
                <span class="stat-label">Access</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">50+</span>
                <span class="stat-label">Classes</span>
            </div>
        </div>

        <div class="big-icon">
            <!-- Barbell SVG -->
            <svg viewBox="0 0 300 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Left outer plate -->
                <rect x="10" y="20" width="18" height="60" rx="3" fill="#0055ff"/>
                <!-- Left inner plate -->
                <rect x="32" y="28" width="12" height="44" rx="2" fill="#0044cc"/>
                <!-- Bar -->
                <rect x="44" y="44" width="212" height="12" rx="4" fill="#0066ff"/>
                <!-- Right inner plate -->
                <rect x="256" y="28" width="12" height="44" rx="2" fill="#0044cc"/>
                <!-- Right outer plate -->
                <rect x="272" y="20" width="18" height="60" rx="3" fill="#0055ff"/>
                <!-- Center grip marks -->
                <rect x="135" y="44" width="3" height="12" rx="1" fill="rgba(0,0,0,0.4)"/>
                <rect x="143" y="44" width="3" height="12" rx="1" fill="rgba(0,0,0,0.4)"/>
                <rect x="151" y="44" width="3" height="12" rx="1" fill="rgba(0,0,0,0.4)"/>
                <rect x="159" y="44" width="3" height="12" rx="1" fill="rgba(0,0,0,0.4)"/>
            </svg>
        </div>
    </div>

    <!-- Login Form -->
    <div class="login-container">
        <div class="login-card">
            <div class="power-bar">
                <div class="power-bar-fill"></div>
            </div>

            <div class="login-title">Welcome Back</div>
            <div class="login-subtitle">Sign in to your member account</div>

            <form>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" placeholder="athlete@ironpulse.com">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
                        </svg>
                    </span>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="••••••••••">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                        </svg>
                    </span>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">
                    🔥 Start Training
                </button>

                <div class="divider">
                    <div class="divider-line"></div>
                    <span class="divider-text">OR CONTINUE WITH</span>
                    <div class="divider-line"></div>
                </div>

                <div class="social-btns">
                    <button type="button" class="social-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="#4285F4">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                        Google
                    </button>
                    <button type="button" class="social-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                        Facebook
                    </button>
                </div>
            </form>

            <div class="register-link">
                New to IronPulse? <a href="#">Join the Elite →</a>
            </div>
        </div>
    </div>

    <!-- Dumbbell in corner -->
    <div class="dumbbell-container">
        <svg class="dumbbell-svg" viewBox="0 0 200 80" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="15" width="20" height="50" rx="4" fill="#0055ff"/>
            <rect x="28" y="24" width="12" height="32" rx="3" fill="#0044cc"/>
            <rect x="40" y="34" width="120" height="12" rx="4" fill="#0066ff"/>
            <rect x="160" y="24" width="12" height="32" rx="3" fill="#0044cc"/>
            <rect x="175" y="15" width="20" height="50" rx="4" fill="#0055ff"/>
        </svg>
    </div>

    <script>
        // Generate floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 25; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = (Math.random() * 8 + 6) + 's';
            particle.style.animationDelay = (Math.random() * 8) + 's';
            particle.style.width = (Math.random() * 4 + 2) + 'px';
            particle.style.height = particle.style.width;
            particle.style.opacity = Math.random() * 0.5;
            particlesContainer.appendChild(particle);
        }

        // Button click effect
        const loginBtn = document.querySelector('.login-btn');
        loginBtn.addEventListener('click', function(e) {
            e.preventDefault();
            this.textContent = '⚡ Loading...';
            this.style.background = 'linear-gradient(135deg, #002299, #0044cc)';
            setTimeout(() => {
                this.textContent = '✅ Access Granted!';
                this.style.background = 'linear-gradient(135deg, #003300, #006600)';
                setTimeout(() => {
                    this.textContent = '🔥 Start Training';
                    this.style.background = '';
                }, 2000);
            }, 1500);
        });
    </script>

</body>
</html>
